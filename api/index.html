<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHL Assessment Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #1e1e2e;
      --border-lit: #2a2a3e;
      --accent: #6c63ff;
      --accent-dim: #3d3880;
      --accent-glow: rgba(108, 99, 255, 0.15);
      --green: #22c55e;
      --green-dim: #16a34a;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --subtle: #2d2d42;
      --tag-bg: #1a1a2e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108, 99, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108, 99, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow orb ── */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(108, 99, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--tag-bg);
      border: 1px solid var(--border-lit);
      border-radius: 100px;
      padding: 6px 16px;
      margin-bottom: 28px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #a8a4ff 50%, #6c63ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Search Panel ── */
    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border-lit);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s 0.1s ease both;
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.06);
    }

    .input-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding: 16px 18px;
      resize: vertical;
      min-height: 110px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea::placeholder { color: var(--muted); }

    .search-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .example-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-search {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-search:hover { background: #7c74ff; transform: translateY(-1px); }
    .btn-search:active { transform: translateY(0); }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Status bar ── */
    .status-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      animation: fadeUp 0.3s ease both;
    }

    .status-bar.visible { display: flex; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-lit);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    /* ── Results header ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .results-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* ── Assessment Cards ── */
    #results { display: none; }
    #results.visible { display: block; animation: fadeUp 0.4s ease both; }

    .cards { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      border-color: var(--accent-dim);
      box-shadow: 0 4px 24px rgba(108, 99, 255, 0.08);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .card-rank {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid var(--accent-dim);
      border-radius: 8px;
      padding: 3px 9px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }

    .card-name a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
    }

    .card-name a:hover { color: var(--accent); }

    .card-desc {
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid;
    }

    .tag-type {
      background: rgba(108, 99, 255, 0.08);
      border-color: var(--accent-dim);
      color: #a8a4ff;
    }

    .tag-remote {
      background: rgba(34, 197, 94, 0.08);
      border-color: var(--green-dim);
      color: var(--green);
    }

    .tag-adaptive {
      background: rgba(245, 158, 11, 0.08);
      border-color: #92400e;
      color: var(--amber);
    }

    .tag-duration {
      background: var(--tag-bg);
      border-color: var(--border);
      color: var(--muted);
    }

    /* ── Error / Empty state ── */
    .state-box {
      text-align: center;
      padding: 48px 24px;
      background: var(--card);
      border: 1px dashed var(--border-lit);
      border-radius: 16px;
    }

    .state-icon { font-size: 36px; margin-bottom: 12px; }
    .state-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .state-sub { color: var(--muted); font-size: 14px; }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Header -->
    <header>
      <div class="logo-badge">
        <span class="logo-dot"></span>
        SHL Assessment Engine
      </div>
      <h1>Find the Right<br />Assessment</h1>
      <p class="subtitle">Describe your role or paste a job description — get AI-powered assessment recommendations instantly.</p>
    </header>

    <!-- Search Panel -->
    <div class="search-panel">
      <label class="input-label" for="queryInput">Query / Job Description / URL</label>
      <textarea
        id="queryInput"
        placeholder="e.g. I am hiring Java developers who can collaborate with business teams and stakeholders..."
      ></textarea>

      <div class="search-footer">
        <div class="example-pills">
          <span class="pill" onclick="setExample(0)">Java + Collaboration</span>
          <span class="pill" onclick="setExample(1)">Python SQL JS</span>
          <span class="pill" onclick="setExample(2)">Analyst + Cognitive</span>
        </div>
        <button class="btn-search" id="searchBtn" onclick="search()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Find Assessments
        </button>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <div class="spinner"></div>
      <span id="statusText">Analyzing query with LLM...</span>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="results-header">
        <div class="results-title">Recommendations</div>
        <div class="results-count" id="resultsCount">0 assessments</div>
      </div>
      <div class="cards" id="cardsContainer"></div>
    </div>

  </div>

  <script>
    // ── Config ─────────────────────────────────────────────────
    // Update this to your deployed API base URL
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8000'
      : '';  // same-origin if frontend is served by FastAPI

    const EXAMPLES = [
      "I am hiring for Java developers who can also collaborate effectively with my business teams.",
      "Looking to hire mid-level professionals who are proficient in Python, SQL and JavaScript.",
      "I am hiring for an analyst and want to screen applicants using Cognitive and personality tests.",
    ];

    function setExample(idx) {
      document.getElementById('queryInput').value = EXAMPLES[idx];
    }

    // ── Search ─────────────────────────────────────────────────
    async function search() {
      const query = document.getElementById('queryInput').value.trim();
      if (!query) return;

      const btn = document.getElementById('searchBtn');
      const statusBar = document.getElementById('statusBar');
      const statusText = document.getElementById('statusText');
      const results = document.getElementById('results');
      const container = document.getElementById('cardsContainer');

      btn.disabled = true;
      results.classList.remove('visible');
      container.innerHTML = '';

      const steps = [
        'Analyzing query with LLM...',
        'Extracting skills and domains...',
        'Searching assessment catalog...',
        'Reranking with AI...',
        'Balancing recommendations...',
      ];
      let stepIdx = 0;
      statusBar.classList.add('visible');
      statusText.textContent = steps[0];
      const stepInterval = setInterval(() => {
        stepIdx = Math.min(stepIdx + 1, steps.length - 1);
        statusText.textContent = steps[stepIdx];
      }, 900);

      try {
        const resp = await fetch(`${API_BASE}/recommend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });

        clearInterval(stepInterval);
        statusBar.classList.remove('visible');

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: 'Unknown error' }));
          showError(`API Error ${resp.status}: ${err.detail || 'Request failed'}`);
          return;
        }

        const data = await resp.json();
        const assessments = data.recommended_assessments || [];

        if (assessments.length === 0) {
          showEmpty();
        } else {
          renderCards(assessments);
          document.getElementById('resultsCount').textContent =
            `${assessments.length} assessment${assessments.length !== 1 ? 's' : ''}`;
          results.classList.add('visible');
        }

      } catch (err) {
        clearInterval(stepInterval);
        statusBar.classList.remove('visible');
        showError(`Connection failed: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    // ── Render ─────────────────────────────────────────────────
    function renderCards(assessments) {
      const container = document.getElementById('cardsContainer');
      container.innerHTML = assessments.map((a, i) => `
        <div class="card" style="animation-delay:${i * 0.05}s">
          <div class="card-top">
            <div class="card-rank">#${i + 1}</div>
            <div class="card-name">
              <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.name)}</a>
            </div>
          </div>
          ${a.description ? `<div class="card-desc">${esc(a.description)}</div>` : ''}
          <div class="card-meta">
            ${(a.test_type || []).map(t => `<span class="tag tag-type">${esc(t)}</span>`).join('')}
            ${a.remote_support === 'Yes' ? '<span class="tag tag-remote">Remote</span>' : ''}
            ${a.adaptive_support === 'Yes' ? '<span class="tag tag-adaptive">Adaptive</span>' : ''}
            ${a.duration ? `<span class="tag tag-duration">⏱ ${a.duration} min</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function showError(msg) {
      const container = document.getElementById('cardsContainer');
      const results = document.getElementById('results');
      container.innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Something went wrong</div>
          <div class="state-sub">${esc(msg)}</div>
        </div>`;
      document.getElementById('resultsCount').textContent = '0 assessments';
      results.classList.add('visible');
    }

    function showEmpty() {
      const container = document.getElementById('cardsContainer');
      const results = document.getElementById('results');
      container.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <div class="state-title">No assessments found</div>
          <div class="state-sub">Try a more descriptive query or a different job description.</div>
        </div>`;
      document.getElementById('resultsCount').textContent = '0 assessments';
      results.classList.add('visible');
    }

    function esc(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str || '')));
      return d.innerHTML;
    }

    // Ctrl/Cmd + Enter to search
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('queryInput').addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') search();
      });
    });
  </script>
</body>
</html>
